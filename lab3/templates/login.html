{% extends "_base.html" %}

{% block title %}Login - MySite{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">Autentificare</h2>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Utilizator</label>
                <!-- name="username" - citit in Flask cu request.form["username"] -->
                <input type="text"
                       class="form-control"
                       id="username"
                       name="username"
                       placeholder="ex: admin"
                       required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Parola</label>
                <!-- name="password" - citit in Flask cu request.form["password"] -->
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="parola"
                       required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-muted text-center">
            <small>Conturi de test: <code>admin/admin</code> sau <code>user/user</code></small>
        </p>
    </div>
</div>
{% endblock %}
